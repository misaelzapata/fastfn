worker_processes auto;

error_log /dev/stderr info;
pid logs/nginx.pid;

env FN_ADMIN_TOKEN;
env FN_HEALTH_INTERVAL;
env FN_HOT_RELOAD;
env FN_HOT_RELOAD_INTERVAL;
env FN_HOT_RELOAD_WATCHDOG;
env FN_HOT_RELOAD_WATCHDOG_POLL;
env FN_HOT_RELOAD_DEBOUNCE_MS;
env FN_SCHEDULER_INTERVAL;
env FN_SCHEDULER_PERSIST_ENABLED;
env FN_SCHEDULER_PERSIST_INTERVAL;
env FN_SCHEDULER_STATE_PATH;
env FN_JOBS_ENABLED;
env FN_JOBS_POLL_INTERVAL;
env FN_JOBS_MAX_CONCURRENCY;
env FN_JOBS_MAX_RESULT_BYTES;
env FN_FUNCTIONS_ROOT;
env FN_RUNTIMES;
env FN_RUNTIME_SOCKETS;
env FN_SOCKET_BASE_DIR;
env FN_DEFAULT_TIMEOUT_MS;
env FN_DEFAULT_MAX_CONCURRENCY;
env FN_DEFAULT_MAX_BODY_BYTES;
env FN_UI_ENABLED;
env FN_CONSOLE_API_ENABLED;
env FN_CONSOLE_WRITE_ENABLED;
env FN_CONSOLE_LOCAL_ONLY;
env FN_CONSOLE_LOGIN_ENABLED;
env FN_CONSOLE_LOGIN_API;
env FN_ADMIN_API_ENABLED;
env FN_CONSOLE_LOGIN_USERNAME;
env FN_CONSOLE_LOGIN_PASSWORD;
env FN_CONSOLE_SESSION_SECRET;
env FN_CONSOLE_SESSION_TTL_S;
env FN_HTTP_VERIFY_TLS;
env FN_ASSISTANT_ENABLED;
env FN_ASSISTANT_PROVIDER;
env FN_DOCS_ENABLED;
env FN_OPENAPI_INCLUDE_INTERNAL;
env FN_OPENAPI_INCLUDE_FN_PATHS;
env FN_FORCE_URL;
env FN_PUBLIC_BASE_URL;
env OPENAI_API_KEY;
env OPENAI_MODEL;
env OPENAI_BASE_URL;
env ANTHROPIC_API_KEY;
env ANTHROPIC_MODEL;
env ANTHROPIC_BASE_URL;
env ANTHROPIC_VERSION;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  lua_package_path "$prefix/lua/?.lua;$prefix/lua/?/init.lua;;";
  lua_code_cache on; # PRODUCTION MODE: ON (Should be 'off' only for debug)
  
  # Optimization: Keepalive to upstream sockets? Not applicable for Unix Sockets in this way usually, but good practice.
  keepalive_timeout 65;
  keepalive_requests 1000;
  
  # Buffers
  client_body_buffer_size 128k;
  client_max_body_size 10m;
  
  # Compression
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  log_format fastfn_access '$remote_addr - [$time_local] "$request" status=$status bytes=$body_bytes_sent rt=$request_time ua="$http_user_agent"';
  access_log /dev/stdout fastfn_access;

  lua_shared_dict fn_cache 10m;
  lua_shared_dict fn_conc 10m;

  # For HTTPS outbound calls from Lua (assistant + optional edge proxy).
  lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  lua_ssl_verify_depth 3;
  resolver 127.0.0.11 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
  resolver_timeout 5s;

  init_worker_by_lua_block {
    math.randomseed(ngx.now() * 100000 + ngx.worker.pid())
    require("fastfn.core.routes").init()
    require("fastfn.core.scheduler").init()
    require("fastfn.core.jobs").init()
  }

  server {
    listen 8080;
    server_name _;

    # Never expose local CLI config files over HTTP.
    location ~* ^/(fastfn\.json|fastfn\.toml)$ {
      return 404;
    }

    location = / {
      content_by_lua_file lua/fastfn/http/home.lua;
    }

    # Public function routes: /fn/<name> and /fn/<name>@<version>
    location ~ ^/fn/([a-zA-Z0-9_-]+)(?:@([a-zA-Z0-9_.-]+))?$ {
      content_by_lua_file lua/fastfn/http/gateway.lua;
    }

    location = /_fn/health {
      default_type application/json;
      content_by_lua_block {
        ngx.say(require("fastfn.core.routes").health_json())
      }
    }

    location = /system/metrics {
      default_type application/json;
      content_by_lua_block {
        ngx.say(require("fastfn.core.routes").health_json())
      }
    }

    location = /_fn/reload {
      content_by_lua_file lua/fastfn/http/reload.lua;
    }

    location = /_fn/catalog {
      content_by_lua_file lua/fastfn/http/catalog.lua;
    }

    location = /_fn/packs {
      content_by_lua_file lua/fastfn/http/packs.lua;
    }

    location = /_fn/schedules {
      content_by_lua_file lua/fastfn/http/schedules.lua;
    }

    location = /_fn/jobs {
      content_by_lua_file lua/fastfn/http/jobs.lua;
    }

    location ~ ^/_fn/jobs/([a-zA-Z0-9_.-]+)(?:/(result))?$ {
      content_by_lua_file lua/fastfn/http/job_item.lua;
    }

    location = /_fn/function {
      content_by_lua_file lua/fastfn/http/function.lua;
    }

    location = /_fn/function-config {
      content_by_lua_file lua/fastfn/http/function_config.lua;
    }

    location = /_fn/function-env {
      content_by_lua_file lua/fastfn/http/function_env.lua;
    }

    location = /_fn/api/functions {
      content_by_lua_file lua/fastfn/console/functions_endpoint.lua;
    }

    location = /_fn/function-code {
      content_by_lua_file lua/fastfn/http/function_code.lua;
    }

    location = /_fn/invoke {
      content_by_lua_file lua/fastfn/console/invoke_endpoint.lua;
    }

    location = /_fn/ui-state {
      content_by_lua_file lua/fastfn/console/ui_state_endpoint.lua;
    }

    location = /_fn/login {
      content_by_lua_file lua/fastfn/console/login_endpoint.lua;
    }

    location = /_fn/logout {
      content_by_lua_file lua/fastfn/console/logout_endpoint.lua;
    }

    location = /_fn/assistant/generate {
      content_by_lua_file lua/fastfn/console/assistant_endpoint.lua;
    }

    location = /_fn/assistant/status {
      content_by_lua_file lua/fastfn/console/assistant_status_endpoint.lua;
    }

    location = /_fn/secrets {
      content_by_lua_file lua/fastfn/console/secrets_endpoint.lua;
    }

    location = /_fn/dashboard {
      content_by_lua_file lua/fastfn/console/dashboard_endpoint.lua;
    }

    location = /_fn/logs {
      content_by_lua_file lua/fastfn/http/logs.lua;
    }

    location = /_fn/openapi.json {
      default_type application/json;
      content_by_lua_file lua/fastfn/http/openapi_endpoint.lua;
    }

    # Public OpenAPI spec (used by docs/tutorials).
    location = /openapi.json {
      default_type application/json;
      content_by_lua_file lua/fastfn/http/openapi_endpoint.lua;
    }

    location = /_fn/docs {
      content_by_lua_file lua/fastfn/http/swagger_ui.lua;
    }

    location = /console {
      content_by_lua_file lua/fastfn/console/ui.lua;
    }

    # Console assets (ES modules + css)
    location ^~ /console/assets/ {
      content_by_lua_file lua/fastfn/console/asset.lua;
    }

    # Console app (all subpaths under /console/ are handled client-side).
    location ^~ /console/ {
      content_by_lua_file lua/fastfn/console/ui.lua;
    }

    # Fallback function routing for configured mapped endpoints (invoke.routes)
    location / {
      content_by_lua_file lua/fastfn/http/gateway.lua;
    }
  }
}
