name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    env:
      # GitHub Actions does not allow `secrets.*` directly in `if:` expressions.
      # We map the secret to `env` and gate steps based on env presence.
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Release (with Homebrew tap)
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          # Explicitly pin major to avoid "latest" ambiguity/noise.
          version: "~> v2"
          workdir: cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Release (skip Homebrew tap)
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN == '' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          workdir: cli
          args: release --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Runtime Image
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/openresty/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/runtime:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
