services:
  openresty:
    build:
      context: .
      dockerfile: docker/openresty/Dockerfile
    ports:
      - "${FN_HOST_PORT:-8080}:8080"
    volumes:
      # Use a writable throwaway functions root by default to avoid mutating tracked examples.
      # To run the shipped demos with docker-compose directly:
      #   FN_FUNCTIONS_ROOT=./examples/functions docker compose up
      - ${FN_FUNCTIONS_ROOT:-./srv/fn/functions}:/app/srv/fn/functions
      # Mount Lua sources for development hot-reload
      - ./openresty/lua/fastfn:/app/openresty/lua/fastfn
    environment:
      FN_RUNTIMES: ${FN_RUNTIMES:-python,node,php,lua}
      FN_RUNTIME_DAEMONS: ${FN_RUNTIME_DAEMONS:-}
      FN_RUNTIME_SOCKETS: ${FN_RUNTIME_SOCKETS:-}
      FN_OPENRESTY_BIN: ${FN_OPENRESTY_BIN:-}
      FN_PYTHON_BIN: ${FN_PYTHON_BIN:-}
      FN_NODE_BIN: ${FN_NODE_BIN:-}
      FN_NPM_BIN: ${FN_NPM_BIN:-}
      FN_PHP_BIN: ${FN_PHP_BIN:-}
      FN_COMPOSER_BIN: ${FN_COMPOSER_BIN:-}
      FN_CARGO_BIN: ${FN_CARGO_BIN:-}
      FN_GO_BIN: ${FN_GO_BIN:-}
      FN_UI_ENABLED: ${FN_UI_ENABLED:-0}
      FN_ADMIN_API_ENABLED: ${FN_ADMIN_API_ENABLED:-1}
      FN_DOCS_ENABLED: ${FN_DOCS_ENABLED:-1}
      FN_OPENAPI_INCLUDE_INTERNAL: ${FN_OPENAPI_INCLUDE_INTERNAL:-0}
      FN_CONSOLE_API_ENABLED: ${FN_CONSOLE_API_ENABLED:-1}
      FN_CONSOLE_WRITE_ENABLED: ${FN_CONSOLE_WRITE_ENABLED:-1}
      FN_CONSOLE_LOCAL_ONLY: ${FN_CONSOLE_LOCAL_ONLY:-1}
      FN_CONSOLE_LOGIN_ENABLED: ${FN_CONSOLE_LOGIN_ENABLED:-0}
      FN_CONSOLE_LOGIN_API: ${FN_CONSOLE_LOGIN_API:-0}
      FN_CONSOLE_LOGIN_USERNAME: ${FN_CONSOLE_LOGIN_USERNAME:-}
      FN_CONSOLE_LOGIN_PASSWORD: ${FN_CONSOLE_LOGIN_PASSWORD:-}
      FN_CONSOLE_LOGIN_PASSWORD_HASH: ${FN_CONSOLE_LOGIN_PASSWORD_HASH:-}
      FN_CONSOLE_SESSION_SECRET: ${FN_CONSOLE_SESSION_SECRET:-}
      FN_CONSOLE_SESSION_TTL_S: ${FN_CONSOLE_SESSION_TTL_S:-}
      FN_CONSOLE_RATE_LIMIT_MAX: ${FN_CONSOLE_RATE_LIMIT_MAX:-}
      FN_CONSOLE_RATE_LIMIT_WINDOW_S: ${FN_CONSOLE_RATE_LIMIT_WINDOW_S:-}
      FN_CONSOLE_WRITE_RATE_LIMIT_MAX: ${FN_CONSOLE_WRITE_RATE_LIMIT_MAX:-}
      FN_ADMIN_TOKEN: ${FN_ADMIN_TOKEN:-}
      FN_STRICT_FS: ${FN_STRICT_FS:-1}
      FN_STRICT_FS_ALLOW: ${FN_STRICT_FS_ALLOW:-/usr/bin/chromium:/usr/bin/chromium-browser:/usr/lib/chromium}
      FN_SCHEDULER_ENABLED: ${FN_SCHEDULER_ENABLED:-1}
      # Docker Desktop bind mounts do not reliably deliver inotify delete/move events.
      # Use interval-based rescans by default for predictable hot-reload.
      # Set FN_HOT_RELOAD_WATCHDOG=1 to enable the inotify watchdog.
      FN_HOT_RELOAD_WATCHDOG: ${FN_HOT_RELOAD_WATCHDOG:-0}
      FN_PREINSTALL_PY_DEPS_ON_START: ${FN_PREINSTALL_PY_DEPS_ON_START:-1}
      FN_PREINSTALL_NODE_DEPS_ON_START: ${FN_PREINSTALL_NODE_DEPS_ON_START:-1}
      FN_AUTO_REQUIREMENTS: ${FN_AUTO_REQUIREMENTS:-1}
      FN_AUTO_NODE_DEPS: ${FN_AUTO_NODE_DEPS:-1}
      FN_AUTO_PHP_DEPS: ${FN_AUTO_PHP_DEPS:-1}
      FN_AUTO_INFER_PY_DEPS: ${FN_AUTO_INFER_PY_DEPS:-1}
      FN_AUTO_INFER_NODE_DEPS: ${FN_AUTO_INFER_NODE_DEPS:-1}
      FN_AUTO_INFER_WRITE_MANIFEST: ${FN_AUTO_INFER_WRITE_MANIFEST:-1}
      FN_AUTO_INFER_STRICT: ${FN_AUTO_INFER_STRICT:-1}
      FN_ZERO_CONFIG_IGNORE_DIRS: ${FN_ZERO_CONFIG_IGNORE_DIRS:-}
      FN_DEFAULT_TIMEOUT_MS: ${FN_DEFAULT_TIMEOUT_MS:-}
      FN_HTTP_VERIFY_TLS: ${FN_HTTP_VERIFY_TLS:-1}
      FN_PUBLIC_BASE_URL: ${FN_PUBLIC_BASE_URL:-}
      FN_FORCE_URL: ${FN_FORCE_URL:-0}
      FN_HOME_FUNCTION: ${FN_HOME_FUNCTION:-}
      FN_HOME_REDIRECT: ${FN_HOME_REDIRECT:-}
      FN_LUA_COVERAGE: ${FN_LUA_COVERAGE:-0}
      FN_LUA_COVERAGE_STATS: ${FN_LUA_COVERAGE_STATS:-/tmp/luacov.stats.out}
      FN_LUA_COVERAGE_REPORT: ${FN_LUA_COVERAGE_REPORT:-/tmp/luacov.report.out}
      LUACOV_CONFIG: ${LUACOV_CONFIG:-/tmp/.luacov}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-}
    restart: unless-stopped
