site_name: FastFN
site_url: https://misaelzapata.github.io/fastfn/
repo_url: https://github.com/misaelzapata/fastfn
repo_name: FastFN
edit_uri: blob/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: logo.PNG
  favicon: logo.PNG
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search

# Keep internal planning/coordination docs in the repo, but do not publish them
# to the public documentation site.
exclude_docs: |
  internal/**

